<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Particle Paradise</title>

		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
	position: fixed;
	width: 100%;
	height: 100%;
}

#canvas {
	display: block;
	width: 100%;
	height: 100%;
}

#canvas:focus {
	outline: none;
}

/* -------------------- FULLSCREEN BUTTON -------------------- */
#fsButton {
	position: absolute;
	top: 10px;
	right: 10px;
	z-index: 9999;
	padding: 10px 12px;
	font-size: 14px;
	background: rgba(0,0,0,0.6);
	color: white;
	border: 1px solid rgba(255,255,255,0.3);
	border-radius: 6px;
}

#fsButton:active {
	transform: scale(0.95);
}

/* -------------------- STATUS UI (unchanged) -------------------- */
#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #202124;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>

		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
		<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
	</head>

	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<!-- FULLSCREEN BUTTON -->
		<button id="fsButton">Fullscreen</button>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--false use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>

		<script>
		function goFullscreen() {
			const elem = document.documentElement;

			if (elem.requestFullscreen) {
				elem.requestFullscreen();
			} else if (elem.webkitRequestFullscreen) {
				elem.webkitRequestFullscreen();
			} else if (elem.msRequestFullscreen) {
				elem.msRequestFullscreen();
			}
		}

		// Button click
		document.getElementById("fsButton").addEventListener("click", () => {
			goFullscreen();
		});

		// FIRST TOUCH auto fullscreen (mobile)
		let firstTap = true;
		document.addEventListener("touchstart", () => {
			if (!firstTap) return;
			firstTap = false;
			goFullscreen();
		}, { once: true });
		</script>

		<script>
		const fsButton = document.getElementById("fsButton");

		function updateButton() {
			const isFs = document.fullscreenElement;

			if (isFs) {
				fsButton.style.display = "none";
			} else {
				fsButton.style.display = "block";
			}
		}

		// Only real browser event (safe)
		document.addEventListener("fullscreenchange", updateButton);

		// initialize once
		updateButton();
		</script>
	</body>
</html>
